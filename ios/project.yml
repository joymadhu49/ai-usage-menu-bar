name: AIUsage
options:
  bundleIdPrefix: com.local
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Automatic
    CURRENT_PROJECT_VERSION: "1"
    MARKETING_VERSION: "0.1.0"
targets:
  AIUsage:
    type: application
    platform: iOS
    sources:
      - path: AIUsage
      - path: Shared
    entitlements:
      path: AIUsage/AIUsage.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.local.aiusage
    info:
      path: AIUsage/Info.plist
      properties:
        CFBundleDisplayName: AI Usage
        UILaunchScreen: {}
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        NSLocalNetworkUsageDescription: AI Usage connects to your Mac on the local network to read Claude Code and Codex usage.
        NSBonjourServices: [_aiusage._tcp]
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    dependencies:
      - target: AIUsageWidgetExt
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.local.aiusage
        TARGETED_DEVICE_FAMILY: "1"
  AIUsageWidgetExt:
    type: app-extension
    platform: iOS
    sources:
      - path: Widget
      - path: Shared
    entitlements:
      path: Widget/Widget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.local.aiusage
    info:
      path: Widget/Info.plist
      properties:
        CFBundleDisplayName: AI Usage
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.local.aiusage.widget
        SKIP_INSTALL: true
